name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  VCPKG_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Update apt package index
        run: sudo apt-get update
      - name: Install Linux build dependencies
        run: |
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            autoconf \
            autoconf-archive \
            automake \
            libtool
      - name: Verify autotools before vcpkg
        run: |
          command -v ninja
          command -v pkg-config
          command -v autoconf
          command -v automake
          command -v libtoolize
          libtoolize --version
      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: vcpkg-bincache-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-linux-
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV
      - name: Configure
        run: cmake --preset default
      - name: Build
        run: cmake --build build/default
      - name: Build benchmarks
        run: cmake --build build/default --target bench_hash
      - name: Test
        run: ctest --test-dir build/default --output-on-failure

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install ninja
      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: vcpkg-bincache-macos-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-macos-
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV
      - name: Configure
        run: cmake --preset default
      - name: Build
        run: cmake --build build/default
      - name: Test
        run: ctest --test-dir build/default --output-on-failure

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: vcpkg-bincache-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-windows-
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
      - name: Configure
        run: cmake --preset windows-msvc
      - name: Build
        run: cmake --build build/msvc --config Release
      - name: Test
        run: ctest --test-dir build/msvc -C Release --output-on-failure
