name: CI

on:
  push:
    branches: [main, master, milestone-*]
  pull_request:
    branches: [main, master]

env:
  VCPKG_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            autoconf \
            autoconf-archive \
            automake \
            libtool

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: vcpkg-bincache-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-linux-

      - name: Read vcpkg baseline
        id: vcpkg_baseline
        run: |
          echo "commit=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")" >> "$GITHUB_OUTPUT"

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg_baseline.outputs.commit }}
          path: ${{ runner.temp }}/vcpkg
          fetch-depth: 1

      - name: Bootstrap vcpkg
        run: ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh

      - name: Set VCPKG_ROOT
        run: echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build build/default

      - name: Test
        run: ctest --test-dir build/default --output-on-failure

      - name: Benchmark smoke (hash)
        run: ./build/default/benchmarks/bench_hash --benchmark_filter=BM_L2Comparison --benchmark_repetitions=1

      - name: Benchmark smoke (similarity)
        run: ./build/default/benchmarks/bench_similarity_search --benchmark_filter=BM_BucketedNearest/100 --benchmark_repetitions=1

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ninja

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: vcpkg-bincache-macos-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-macos-

      - name: Read vcpkg baseline
        id: vcpkg_baseline
        run: |
          echo "commit=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")" >> "$GITHUB_OUTPUT"

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg_baseline.outputs.commit }}
          path: ${{ runner.temp }}/vcpkg
          fetch-depth: 1

      - name: Bootstrap vcpkg
        run: ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh

      - name: Set VCPKG_ROOT
        run: echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset macos

      - name: Build
        run: cmake --build build/macos

      - name: Test
        run: ctest --test-dir build/macos --output-on-failure

      - name: Benchmark smoke (hash)
        run: ./build/macos/benchmarks/bench_hash --benchmark_filter=BM_L2Comparison --benchmark_repetitions=1

      - name: Benchmark smoke (similarity)
        run: ./build/macos/benchmarks/bench_similarity_search --benchmark_filter=BM_BucketedNearest/100 --benchmark_repetitions=1

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: vcpkg-bincache-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-windows-

      - name: Read vcpkg baseline
        id: vcpkg_baseline
        shell: pwsh
        run: |
          $commit = (Get-Content vcpkg.json -Raw | ConvertFrom-Json).'builtin-baseline'
          "commit=$commit" >> $env:GITHUB_OUTPUT

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg_baseline.outputs.commit }}
          path: C:\vcpkg
          fetch-depth: 1

      - name: Bootstrap vcpkg
        run: C:\vcpkg\bootstrap-vcpkg.bat

      - name: Set VCPKG_ROOT
        shell: pwsh
        run: echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build
        run: cmake --build build/msvc --config Release

      - name: Test
        run: ctest --test-dir build/msvc -C Release --output-on-failure

      - name: Benchmark smoke (hash)
        run: build\msvc\benchmarks\Release\bench_hash.exe --benchmark_filter=BM_L2Comparison --benchmark_repetitions=1

      - name: Benchmark smoke (similarity)
        run: build\msvc\benchmarks\Release\bench_similarity_search.exe --benchmark_filter=BM_BucketedNearest/100 --benchmark_repetitions=1
