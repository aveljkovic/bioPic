name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV
      - name: Configure
        run: cmake --preset default
      - name: Build
        run: cmake --build build/default
      - name: Test
        run: ctest --test-dir build/default --output-on-failure

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install ninja
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV
      - name: Configure
        run: cmake --preset default
      - name: Build
        run: cmake --build build/default
      - name: Test
        run: ctest --test-dir build/default --output-on-failure

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
      - name: Configure
        run: cmake --preset windows-msvc
      - name: Build
        run: cmake --build build/msvc --config Release
      - name: Test
        run: ctest --test-dir build/msvc -C Release --output-on-failure
