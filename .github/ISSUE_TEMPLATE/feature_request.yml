name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved and how BioPic could address it.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or use case motivates this request?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should BioPic behave? Which components are involved?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Primary component
      options:
        - Hasher / fingerprinting
        - SimilarityIndex / search
        - FingerprintStore / persistence
        - Classifier / ONNX
        - Scanner / pipeline
        - CLI
        - C ABI / bindings
        - Documentation / CI
        - Other
    validations:
      required: true

  - type: checkboxes
    id: alternatives
    attributes:
      label: Alternatives considered
      options:
        - label: I considered workarounds using the current API
          required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, benchmarks, or examples from other projects.
